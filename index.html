<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>테트리스</h1>
    </header>

    <main class="game-area">
      <div id="board" class="board" aria-label="게임 보드"></div>

      <aside class="side-panel">
        <section class="score-panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
          <p id="game-status" class="game-status" aria-live="polite"></p>
        </section>

        <section class="button-panel">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </section>
      </aside>
    </main>

    <section class="touch-controls" aria-label="터치 조작">
      <button type="button" class="touch-btn touch-btn--rotate" id="touch-rotate" aria-label="회전">↻</button>
      <div class="touch-controls__d-pad">
        <button type="button" class="touch-btn" id="touch-left" aria-label="왼쪽">←</button>
        <button type="button" class="touch-btn" id="touch-down" aria-label="아래">↓</button>
        <button type="button" class="touch-btn" id="touch-right" aria-label="오른쪽">→</button>
      </div>
      <button type="button" class="touch-btn touch-btn--drop" id="touch-drop" aria-label="즉시 낙하">낙하</button>
    </section>

    <section class="controls-info">
      <h2>조작법</h2>
      <p class="controls-note controls-note--keyboard">게임 시작 후 키보드로 조작합니다. 벽·블록과 충돌하면 이동·회전은 취소됩니다.</p>
      <p class="controls-note controls-note--touch">모바일에서는 화면 하단 버튼으로 조작할 수 있습니다.</p>
      <ul>
        <li><kbd>←</kbd> (ArrowLeft) : 왼쪽 이동</li>
        <li><kbd>→</kbd> (ArrowRight) : 오른쪽 이동</li>
        <li><kbd>↓</kbd> (ArrowDown) : 한 칸 빠르게 내리기</li>
        <li><kbd>↑</kbd> (ArrowUp) : 블록 회전</li>
        <li><kbd>Space</kbd> : 즉시 낙하 (hard drop)</li>
      </ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
